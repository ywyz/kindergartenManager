name: dev4 CI

on:
  push:
    branches:
      - dev4.0
  pull_request:
    branches:
      - dev4.0

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  p0-contracts:
    name: P0 contracts, tests, evals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependency
        run: python -m pip install pytest

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Gate tests
        run: pnpm test:gate

      - name: Periodic evals
        run: pnpm eval:periodic

      - name: Python planning contract
        run: pytest tests/test_dev4_planning_contract.py -q

      - name: Dependency audit
        run: pnpm audit:deps

      - name: Generate SBOM
        run: pnpm run sbom:generate

      - uses: actions/upload-artifact@v4
        with:
          name: dev4-sbom
          path: sbom.cdx.json
          retention-days: 14
