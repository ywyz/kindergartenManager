name: Release Build

# 推送 v* 格式的 tag 时触发（例如 v3.0.0-beta.1、v1.2.3）
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write       # 创建 GitHub Release 并上传附件
  packages: write       # 推送到 GitHub Container Registry (ghcr.io)

# Node.js 24 opt-in（Node.js 20 将于 2026-06-16 强制替换）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Windows 安装包 + 便携包 ───────────────────────────────────────────────
  build-windows:
    name: Build Windows (Installer + ZIP)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (onedir)
        run: pyinstaller kindergartenManager.spec

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Extract version (strip leading v)
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Windows installer (Inno Setup)
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ^
            packaging\windows\installer.iss ^
            /DMyAppVersion=${{ steps.ver.outputs.version }}

      - name: Create portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\KindergartenManager\*" `
            -DestinationPath "dist\KindergartenManager-${{ steps.ver.outputs.version }}-windows-portable.zip"

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/KindergartenManager-Setup-${{ steps.ver.outputs.version }}.exe
          retention-days: 7

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist/KindergartenManager-${{ steps.ver.outputs.version }}-windows-portable.zip
          retention-days: 7

  # ── Linux .deb + 便携包 ───────────────────────────────────────────────────
  build-linux:
    name: Build Linux (deb + tar.gz)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc dpkg-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (onedir)
        run: pyinstaller kindergartenManager.spec

      - name: Extract version (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        run: bash packaging/debian/build-deb.sh ${{ steps.ver.outputs.version }}

      - name: Create portable tar.gz
        run: |
          tar -czf "dist/KindergartenManager-${{ steps.ver.outputs.version }}-linux-portable.tar.gz" \
            -C dist KindergartenManager

      - name: Upload Linux deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/kindergarten-manager_${{ steps.ver.outputs.version }}_amd64.deb
          retention-days: 7

      - name: Upload Linux portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-portable
          path: dist/KindergartenManager-${{ steps.ver.outputs.version }}-linux-portable.tar.gz
          retention-days: 7

  # ── Docker 镜像（服务器版） ────────────────────────────────────────────────
  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kindergartenmanager
          # latest 仅随正式版（无 - 后缀 tag）更新，beta/rc 不覆盖 latest
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 创建 GitHub Release ──────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Download each build artifact by explicit name to avoid accidentally
      # pulling in Docker GHA build-cache artifacts (*.dockerbuild) which are
      # not release assets and can fail to extract.
      - name: Download windows-installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows-installer

      - name: Download windows-portable
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: artifacts/windows-portable

      - name: Download linux-deb
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: artifacts/linux-deb

      - name: Download linux-portable
        uses: actions/download-artifact@v4
        with:
          name: linux-portable
          path: artifacts/linux-portable

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # tag 中含 "-"（如 beta、rc）则标记为 prerelease
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: artifacts/**/*
          body: |
            ## 幼儿园教学管理系统 ${{ github.ref_name }}

            ### 下载说明

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `KindergartenManager-Setup-${{ steps.ver.outputs.version }}.exe` | 安装向导（推荐） |
            | Windows | `KindergartenManager-${{ steps.ver.outputs.version }}-windows-portable.zip` | 便携包（解压即用） |
            | Ubuntu/Debian | `kindergarten-manager_${{ steps.ver.outputs.version }}_amd64.deb` | .deb 安装包（含 systemd） |
            | Ubuntu/Linux | `KindergartenManager-${{ steps.ver.outputs.version }}-linux-portable.tar.gz` | 便携包（解压即用） |
            | Docker | `ghcr.io/ywyz/kindergartenmanager:${{ steps.ver.outputs.version }}` | 服务器部署 |

            ---

            ### 🪟 Windows 安装版（推荐）

            1. 下载 `KindergartenManager-Setup-${{ steps.ver.outputs.version }}.exe`
            2. 双击运行安装向导，按提示完成安装
            3. 从开始菜单或桌面快捷方式启动
            4. 程序自动打开浏览器至 http://localhost:8080
            5. 访问 http://localhost:8080/setup 创建管理员账号

            > ⚠️ **Windows 安全提示**：首次运行可能触发 Windows Defender 警告，点击"更多信息" → "仍要运行"即可。

            **零配置模式（内嵌 SQLite）**：直接安装即可使用，无需额外配置数据库。

            **MySQL 模式**：在安装目录创建 `.env` 文件，填写 `DATABASE_URL=mysql+aiomysql://...`，重启程序。

            ---

            ### 🐧 Ubuntu/Debian 安装版（含 systemd 自动启动）

            ```bash
            # 下载 .deb 并安装
            sudo dpkg -i kindergarten-manager_${{ steps.ver.outputs.version }}_amd64.deb

            # 服务自动启动，访问：
            # http://localhost:8080/setup
            ```

            配置文件：`/etc/kindergarten-manager/env`（安装时自动生成随机密钥）

            ```bash
            # 查看服务状态
            systemctl status kindergarten-manager

            # 查看日志
            journalctl -u kindergarten-manager -f
            ```

            ---

            ### 🐳 Docker 服务器版

            ```bash
            # 使用仓库中的 docker-compose.yml（含 MySQL 8）
            docker compose up -d

            # 或直接拉取镜像（使用外部 MySQL）
            docker pull ghcr.io/ywyz/kindergartenmanager:${{ steps.ver.outputs.version }}
            ```

            **最简 Docker 启动（SQLite，演示用）**：
            ```bash
            docker run -d \
              -p 8080:8080 \
              -e ENCRYPTION_KEY="$(head -c 32 /dev/urandom | base64)" \
              -e JWT_SECRET="$(head -c 64 /dev/urandom | base64)" \
              -v kg-data:/app \
              ghcr.io/ywyz/kindergartenmanager:${{ steps.ver.outputs.version }}
            ```

            ---

            ### ⚙️ 环境变量说明（服务器/MySQL 模式必填）

            | 变量 | 必填 | 说明 |
            |------|------|------|
            | `DATABASE_URL` | 否 | 留空使用内嵌 SQLite；MySQL 示例：`******host:3306/db` |
            | `ENCRYPTION_KEY` | 推荐 | AI Key 加密密钥，留空自动生成并持久化 |
            | `JWT_SECRET` | 推荐 | JWT 签名密钥，留空自动生成并持久化 |
            | `HOLIDAY_API_URL` | 否 | 节假日 API，默认 `https://timor.tech/api/holiday/info/` |

            > ⚠️ **重要**：生产/服务器环境请在配置文件中显式设置 `ENCRYPTION_KEY` 和 `JWT_SECRET`，
            > 避免每次重启生成新密钥导致已加密数据无法解密。

            详细使用说明请查阅 [用户手册](docs/USER_MANUAL.md)。
