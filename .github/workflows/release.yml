name: Build and Release

on:
	push:
		tags:
			- "v*"

permissions:
	contents: write

jobs:
	build:
		name: Build (${{ matrix.os }})
		runs-on: ${{ matrix.os }}
		strategy:
			fail-fast: false
			matrix:
				os: [ubuntu-latest, windows-latest]

		steps:
			- name: Checkout
				uses: actions/checkout@v4

			- name: Setup Python
				uses: actions/setup-python@v5
				with:
					python-version: "3.12"

			- name: Setup uv
				uses: astral-sh/setup-uv@v4

			- name: Install dependencies
				run: uv sync --frozen

			- name: Install PyInstaller
				run: uv pip install pyinstaller

			- name: Build on Linux
				if: runner.os == 'Linux'
				run: |
					uv run pyinstaller app/main.py \
						--name kindergarten-manager \
						--onedir \
						--noconfirm \
						--clean \
						--collect-all nicegui \
						--collect-all docx \
						--add-data "templates:templates"

					mkdir -p release-assets
					tar -C dist -czf "release-assets/kindergarten-manager-${{ github.ref_name }}-linux-x64.tar.gz" kindergarten-manager
					sha256sum "release-assets/kindergarten-manager-${{ github.ref_name }}-linux-x64.tar.gz" > "release-assets/kindergarten-manager-${{ github.ref_name }}-linux-x64.sha256"

			- name: Build on Windows
				if: runner.os == 'Windows'
				shell: pwsh
				run: |
					uv run pyinstaller app/main.py `
						--name kindergarten-manager `
						--onedir `
						--noconfirm `
						--clean `
						--collect-all nicegui `
						--collect-all docx `
						--add-data "templates;templates"

					New-Item -ItemType Directory -Path release-assets -Force | Out-Null
					Compress-Archive -Path dist/kindergarten-manager/* -DestinationPath "release-assets/kindergarten-manager-${{ github.ref_name }}-windows-x64.zip" -Force
					Get-FileHash "release-assets/kindergarten-manager-${{ github.ref_name }}-windows-x64.zip" -Algorithm SHA256 |
						ForEach-Object { "$($_.Hash.ToLower())  kindergarten-manager-${{ github.ref_name }}-windows-x64.zip" } |
						Out-File "release-assets/kindergarten-manager-${{ github.ref_name }}-windows-x64.sha256" -Encoding ascii

			- name: Upload build artifacts
				uses: actions/upload-artifact@v4
				with:
					name: build-${{ matrix.os }}
					path: release-assets/*
					if-no-files-found: error

	release:
		name: Publish Release
		runs-on: ubuntu-latest
		needs: build

		steps:
			- name: Download artifacts
				uses: actions/download-artifact@v4
				with:
					path: release-assets
					merge-multiple: true

			- name: Create GitHub Release
				uses: softprops/action-gh-release@v2
				with:
					generate_release_notes: true
					files: release-assets/*
