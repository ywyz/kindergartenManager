services:
  # ── 反向代理（Caddy：自动 HTTPS + 反向代理）──────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - kindergarten_net

  # ── 主系统（NiceGUI 前后端一体化）──────────────────────────────────────
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-kindergarten}:${MYSQL_PASSWORD:-kg_pass_2024}@db:3306/${MYSQL_DATABASE:-kindergarten_db}
    env_file:
      - .env
    volumes:
      - exports:/app/exports
    restart: unless-stopped
    networks:
      - kindergarten_net

  # ── 数据库（MySQL，生产模式）──────────────────────────────────────────────
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-kg_root_2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kindergarten_db}
      MYSQL_USER: ${MYSQL_USER:-kindergarten}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kg_pass_2024}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root",
             "-pkg_root_2024"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kindergarten_net

networks:
  kindergarten_net:
    driver: bridge

volumes:
  db_data:
  exports:
  caddy_data:
  caddy_config:
