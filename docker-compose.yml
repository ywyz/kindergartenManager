services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-kg_root_2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kindergarten_db}
      MYSQL_USER: ${MYSQL_USER:-kindergarten}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kg_pass_2024}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root",
             "-pkg_root_2024"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      # 覆盖 .env 中的 DATABASE_URL，使用容器内 MySQL 服务
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-kindergarten}:${MYSQL_PASSWORD:-kg_pass_2024}@db:3306/${MYSQL_DATABASE:-kindergarten_db}
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - exports:/app/exports
    restart: unless-stopped

volumes:
  db_data:
  exports:
